version: "3.8"

services: 
  mongodb:
    image: mongo
    container_name: mongodb
    ports: 
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    image: docker-layers
    container_name: docker_compose
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      PORT: 5000
    depends_on:
      - mongodb

# 👇 THIS MUST BE OUTSIDE services
volumes:
  mongodb_data: